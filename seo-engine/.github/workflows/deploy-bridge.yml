# ChainIQ Bridge Server — Deploy to Hetzner via Coolify
# Triggered on push to main (after CI passes).

name: Deploy Bridge

on:
  push:
    branches: [main]
    paths:
      - 'bridge/**'
      - 'config/**'
      - 'skills/**'
      - 'agents/**'
      - 'package.json'
      - 'Dockerfile.bridge'

# Only deploy if CI passes
# (Coolify webhook handles the actual deployment — this workflow
#  just validates and triggers it)

jobs:
  deploy:
    name: Deploy Bridge Server
    runs-on: ubuntu-latest
    needs: [] # Add ci job dependency when CI is verified working
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Verify health endpoint exists
        run: grep -q '/health' bridge/server.js

      - name: Build Docker image (verify)
        run: docker build -f Dockerfile.bridge -t chainiq-bridge:test .

      - name: Trigger Coolify deployment
        if: env.COOLIFY_WEBHOOK_URL != ''
        run: |
          curl -X POST "$COOLIFY_WEBHOOK_URL" \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"ref": "${{ github.sha }}"}'
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
