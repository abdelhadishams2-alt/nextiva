# ChainIQ — Local Development
# Runs the bridge server and dashboard together.
# Supabase is hosted (not local) — connect via .env variables.
#
# Usage:
#   docker-compose up              # Start both services
#   docker-compose up bridge       # Bridge server only
#   docker-compose up dashboard    # Dashboard only
#   docker-compose up mock         # Mock API server (no bridge needed)

services:
  bridge:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    ports:
      - "${BRIDGE_PORT:-19847}:19847"
    env_file: .env
    volumes:
      - ./bridge:/app/bridge:ro
      - ./config:/app/config:ro
      - ./skills:/app/skills:ro
      - ./agents:/app/agents:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:19847/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BRIDGE_URL=http://bridge:19847
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    depends_on:
      bridge:
        condition: service_healthy
    restart: unless-stopped

  mock:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    command: ["node", "dev_docs/mocks/server.js"]
    ports:
      - "19848:19848"
    profiles: ["mock"]
    restart: unless-stopped
